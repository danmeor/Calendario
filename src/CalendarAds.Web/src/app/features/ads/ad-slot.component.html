@if (slot) {
  <ins
    class="adsbygoogle ad-slot"
    [class.rectangle]="variant === 'rectangle'"
    [class.horizontal]="variant === 'horizontal'"
    [attr.data-ad-client]="client"
    [attr.data-ad-slot]="slot"
    data-ad-format="auto"
    data-full-width-responsive="true"
    [style.width.px]="width"
    [style.min-height.px]="height"
    [attr.aria-label]="placement"
  ></ins>
}
