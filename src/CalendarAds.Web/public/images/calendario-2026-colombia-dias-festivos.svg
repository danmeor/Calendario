<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Calendario 2026 Colombia con dias festivos</title>
  <desc id="desc">Vista anual del calendario 2026 de Colombia con meses y dias festivos nacionales destacados.</desc>
  <rect width="1200" height="630" rx="42" fill="#f8fafc"/>
  <rect x="36" y="36" width="1128" height="558" rx="32" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
  <rect x="36" y="36" width="1128" height="148" rx="32" fill="#0f766e"/>
  <rect x="36" y="142" width="1128" height="42" fill="#0f766e"/>
